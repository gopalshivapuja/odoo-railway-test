name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint scripts
        run: ruff check scripts
      - name: Compile Python
        run: python -m compileall scripts

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t odoo-custom:ci .
